<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アメリカ横断ウルトラクイズ風 一問一答</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse at top,#1b2a6b 0%,#0a0e2a 60%,#05071a 100%);background-attachment:fixed;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;font-size:16px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.container{max-width:480px;margin:0 auto;padding:16px}
h1{font-size:24px;text-align:center;margin-bottom:6px;color:#ffd700;text-shadow:0 2px 8px rgba(255,215,0,.4);letter-spacing:1px;line-height:1.3}
h2{font-size:18px;margin-bottom:12px;color:#ffd700}
.subtitle{text-align:center;font-size:13px;color:#aab4e0;margin-bottom:20px;letter-spacing:2px}
.star{color:#ffd700;font-size:13px}
.card{background:linear-gradient(160deg,#16215c,#0d1440);border:1px solid rgba(255,215,0,.25);border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeIn .35s ease;box-shadow:0 6px 24px rgba(0,0,0,.4)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15);opacity:1}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,.4)}50%{box-shadow:0 0 22px rgba(255,215,0,.9)}}
@keyframes flyIn{from{opacity:0;transform:scale(.3) rotate(-12deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;color:#fff;min-height:52px;text-align:center}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:linear-gradient(135deg,#e63946,#ff6b6b);font-size:20px;padding:20px;box-shadow:0 4px 16px rgba(230,57,70,.5);animation:glow 2.4s ease-in-out infinite}
.btn-gold{background:linear-gradient(135deg,#ffd700,#ffb300);color:#1a1a2e}
.btn-outline{background:transparent;border:2px solid #ffd700;color:#ffd700}
.btn-danger{background:linear-gradient(135deg,#b71c1c,#e63946)}
.btn+.btn{margin-top:10px}
.nav-bar{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.nav-btn{padding:9px 18px;border:none;border-radius:20px;background:rgba(255,255,255,.08);color:#aab4e0;font-size:14px;cursor:pointer;min-height:42px}
.nav-btn.active{background:#ffd700;color:#0a0e2a;font-weight:700}
.maru-batsu{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:8px 0}
.mb-btn{padding:24px 0;border:3px solid;border-radius:18px;background:rgba(255,255,255,.05);font-size:56px;font-weight:700;cursor:pointer;transition:all .15s;min-height:120px;line-height:1}
.mb-btn:active{transform:scale(.95)}
.mb-maru{border-color:#ff6b6b;color:#ff6b6b}
.mb-batsu{border-color:#4dabf7;color:#4dabf7}
.mb-btn:disabled{opacity:.35}
.mb-btn.picked-correct{background:rgba(0,200,120,.25);border-color:#2ecc71;color:#2ecc71}
.mb-btn.picked-wrong{background:rgba(230,57,70,.25);border-color:#e63946;color:#e63946}
.mb-label{font-size:13px;color:#aab4e0;display:block;margin-top:6px;font-weight:400}
.choices{display:grid;gap:11px;margin:8px 0}
.choice-btn{padding:16px;border:2px solid rgba(255,215,0,.4);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;font-size:16px;cursor:pointer;transition:all .15s;min-height:54px;text-align:left;display:flex;align-items:center;gap:10px}
.choice-btn:active{transform:scale(.97)}
.choice-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(255,215,0,.25);color:#ffd700;font-size:14px;font-weight:700;flex-shrink:0}
.choice-btn.correct{border-color:#2ecc71;background:rgba(0,200,120,.22)}
.choice-btn.correct .choice-num{background:#2ecc71;color:#fff}
.choice-btn.wrong{border-color:#e63946;background:rgba(230,57,70,.22)}
.choice-btn.wrong .choice-num{background:#e63946;color:#fff}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qnum{font-size:15px;color:#ffd700;font-weight:700}
.genre-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
.qtype-tag{font-size:12px;color:#aab4e0;text-align:center;margin-bottom:6px;letter-spacing:1px}
.question-text{font-size:21px;font-weight:700;line-height:1.6;margin:14px 0 20px;text-align:center}
.progress-top{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-bottom:14px}
.progress-top-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ff6b6b);border-radius:4px;transition:width .4s ease}
.combo-banner{text-align:center;font-size:20px;font-weight:800;padding:12px;margin-bottom:14px;border-radius:14px;animation:flyIn .4s ease;color:#0a0e2a;background:linear-gradient(135deg,#ffd700,#ffb300);box-shadow:0 4px 16px rgba(255,215,0,.5)}
.result-correct{text-align:center;padding:18px;border-radius:16px;background:rgba(0,200,120,.12);border:2px solid #2ecc71;animation:fadeIn .3s ease}
.result-wrong{text-align:center;padding:18px;border-radius:16px;background:rgba(230,57,70,.12);border:2px solid #e63946;animation:shake .5s ease}
.result-icon{font-size:60px;margin-bottom:6px;display:inline-block;animation:pop .45s ease}
.result-label{font-size:26px;font-weight:800;margin-bottom:10px}
.result-label.ok{color:#2ecc71}
.result-label.ng{color:#ff6b6b}
.result-answer{font-size:16px;margin-bottom:12px;line-height:1.6}
.result-explanation{font-size:14px;color:#dde3ff;line-height:1.75;text-align:left;background:rgba(255,255,255,.06);padding:14px;border-radius:10px;margin-top:6px}
.scoreline{display:flex;justify-content:space-around;text-align:center;margin:6px 0 16px}
.scoreline .num{font-size:26px;font-weight:800;color:#ffd700}
.scoreline .lbl{font-size:11px;color:#aab4e0;margin-top:2px}
.final-rank{text-align:center;padding:24px 16px;border-radius:18px;background:linear-gradient(160deg,#16215c,#0d1440);border:2px solid #ffd700;animation:flyIn .5s ease;margin-bottom:16px}
.rank-place{font-size:15px;color:#aab4e0;letter-spacing:2px;margin-bottom:6px}
.rank-title{font-size:30px;font-weight:800;color:#ffd700;text-shadow:0 2px 10px rgba(255,215,0,.5);line-height:1.3;margin-bottom:12px}
.rank-emoji{font-size:56px;margin-bottom:10px}
.rank-desc{font-size:14px;color:#dde3ff;line-height:1.7}
.big-score{font-size:52px;font-weight:800;color:#fff;margin:8px 0}
.big-score small{font-size:22px;color:#aab4e0}
.stats-row{display:flex;justify-content:space-around;text-align:center;margin:16px 0}
.stat-num{font-size:28px;font-weight:800;color:#ffd700}
.stat-label{font-size:12px;color:#aab4e0;margin-top:2px}
.hi-box{text-align:center;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);border-radius:14px;padding:16px;margin-bottom:16px}
.hi-box .num{font-size:34px;font-weight:800;color:#ffd700}
.hi-box .lbl{font-size:12px;color:#aab4e0}
.genre-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.genre-chip{padding:7px 13px;border-radius:18px;font-size:12px;font-weight:600;color:#fff}
.intro-note{font-size:13px;color:#aab4e0;line-height:1.8;text-align:center;margin-bottom:16px}
.hidden{display:none}
.countdown{font-size:80px;font-weight:800;color:#ffd700;text-align:center;animation:pop .5s ease;text-shadow:0 0 20px rgba(255,215,0,.6)}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ===== ジャンル定義 =====
const GENRES = {
  zatsu:{name:'雑学・一般常識',color:'#e63946'},
  chiri:{name:'地理・歴史',color:'#1d8a4f'},
  kagaku:{name:'科学・自然',color:'#3066be'},
  kotoba:{name:'ことば・漢字',color:'#b5179e'}
};

// ===== 問題データ =====
// type:'ox' → a は true(=○) / false(=×)
// type:'choice' → ch:選択肢配列, a:正解インデックス
const QUESTIONS = [
// --- 雑学・一般常識 ---
{g:'zatsu',type:'ox',q:'オリンピックの五輪のマークの色は、上段が青・黒・赤、下段が黄・緑の順に並んでいる。',a:true,ex:'正解は○。五輪マークは上段に青・黒・赤、下段に黄・緑が配置されています。これら5色と白い地色を合わせると、当時のほぼすべての国の国旗の色をまかなえるとされ、世界の団結を象徴しています。'},
{g:'zatsu',type:'ox',q:'信号機の青・黄・赤のうち、点灯する順番が決められており、青の次は必ず黄になる。',a:true,ex:'正解は○。日本の信号は青から黄、黄から赤、赤から青の順で変わり、青のあとに直接赤になることはありません。黄は止まれの予告で、安全に停止できないときのみ進行が認められます。'},
{g:'zatsu',type:'ox',q:'トランプの絵札のうち、片目だけが描かれている人物は全部で3枚ある。',a:true,ex:'正解は○。ハートのキング、スペードのジャック、ダイヤのジャックの3枚が横顔で片目だけ見えるデザインで、俗に隻眼の札と呼ばれます。製造元による細部の違いはありますが定番のデザインです。'},
{g:'zatsu',type:'ox',q:'マラソンの正式な距離は42.195キロメートルである。',a:true,ex:'正解は○。1908年ロンドン五輪で王室の都合により距離が調整され、その後42.195キロが正式距離として定着しました。半端な195メートルは当時の事情の名残です。'},
{g:'zatsu',type:'ox',q:'七味唐辛子には、唐辛子のほかにごまや陳皮など7種類の材料が使われている。',a:true,ex:'正解は○。七味は唐辛子に加え、ごま、陳皮、山椒、麻の実、けしの実、青のりなどを合わせた薬味です。配合は店や地域で異なり、江戸の薬研堀が発祥とされます。'},
{g:'zatsu',type:'ox',q:'寿司屋で出される温かい緑茶のことを、業界用語であがりと呼ぶ。',a:true,ex:'正解は○。あがりは寿司屋の符牒で食事の最後に出すお茶を指しました。本来は花柳界の用語で、最初に出す茶をおでばな、最後をあがりばなと呼んだのが由来です。'},
{g:'zatsu',type:'ox',q:'カレンダーで赤色の数字は休日や祝日を、黒色の数字は平日を表す慣習がある。',a:true,ex:'正解は○。日曜や祝日を赤、平日を黒で示すのが一般的な慣習です。土曜を青で示すカレンダーも多く、色分けで休みが一目でわかる工夫です。'},
{g:'zatsu',type:'ox',q:'郵便記号のマークは、かつての逓信省のカタカナのテを図案化したものである。',a:true,ex:'正解は○。郵便マークは郵便事業を担った逓信省の頭文字テをもとにデザインされたとされています。1887年に制定され、今も切手や郵便ポストで使われています。'},
{g:'zatsu',type:'ox',q:'右手を上げた招き猫は金運を、左手を上げた招き猫は人や客を招くとされる。',a:true,ex:'正解は○。一般に右手は金運・幸運、左手は人や客を招くといわれます。両手を上げた欲張りなものもありますが、お手上げに通じると敬遠されることもあります。'},
{g:'zatsu',type:'ox',q:'ボウリングで1ゲームは10フレームで構成されている。',a:true,ex:'正解は○。ボウリングは10フレームで1ゲームとなり、最終フレームではストライクやスペアを出すと最大3投できます。全部ストライクのパーフェクトは300点です。'},
{g:'zatsu',type:'ox',q:'結婚50周年を祝う記念は金婚式と呼ばれる。',a:true,ex:'正解は○。25周年が銀婚式、50周年が金婚式です。年数ごとに木婚式や真珠婚式など名称があり、年を重ねるほど価値ある素材にちなんだ名がつきます。'},
{g:'zatsu',type:'ox',q:'野球の試合で、投手が一人の打者も塁に出さずに勝つことを完全試合という。',a:true,ex:'正解は○。完全試合は1人の走者も許さず勝利することで、ノーヒットノーランより難易度が高い記録です。四死球やエラーで出塁を許すと完全試合は成立しません。'},
{g:'zatsu',type:'ox',q:'コーヒーカップの取っ手は、伝統的に右利きの人が持ちやすいよう右側に置いて出される。',a:false,ex:'正解は×。喫茶の作法では取っ手を左、スプーンの柄を右に向けて出すのが基本とされます。飲む直前に取っ手を右へ回す所作が想定されているためです。'},
{g:'zatsu',type:'ox',q:'うるう年は4年に一度だが、西暦が100で割り切れる年は原則うるう年にしない。',a:true,ex:'正解は○。グレゴリオ暦では100で割り切れる年は平年とし、さらに400で割り切れる年はうるう年に戻します。2000年は400で割れるためうるう年でした。'},
{g:'zatsu',type:'ox',q:'相撲の土俵は円形で、その直径はおよそ4.55メートルと決められている。',a:true,ex:'正解は○。土俵の内側の円は直径15尺、約4.55メートルです。この円から出るか体が土についたら負けで、寸法は明治期以降に統一されました。'},
{g:'zatsu',type:'ox',q:'バレンタインデーにチョコレートを贈る習慣は、世界中どの国でも日本と同じように一般的である。',a:false,ex:'正解は×。女性が男性にチョコを贈る形は日本独自に発達した商習慣です。海外では恋人同士が花やカードを贈り合うなど、贈り物の形は国によって異なります。'},
{g:'zatsu',type:'ox',q:'お年玉袋のことをポチ袋と呼ぶが、ポチには少しという意味の言葉が含まれている。',a:true,ex:'正解は○。ポチは関西方言などでこれっぽっちのわずかという意味があり、心ばかりの気持ちを包む袋としてポチ袋の名がついたとされます。'},
{g:'zatsu',type:'ox',q:'テニスの得点で、0点のことをラブと呼ぶ。',a:true,ex:'正解は○。テニスでは0点をラブと呼びます。卵を意味するフランス語ルフが訛ったという説が有名で、卵の形が0に似ていることに由来するとされます。'},
{g:'zatsu',type:'ox',q:'ピアノの鍵盤は、白鍵と黒鍵を合わせて全部で88ある。',a:true,ex:'正解は○。標準的なグランドピアノやアップライトの鍵盤は白鍵52、黒鍵36の合計88鍵です。これにより7オクターブ以上の広い音域を演奏できます。'},
{g:'zatsu',type:'ox',q:'喪服として黒い服を着る習慣は、日本では古来から続く伝統である。',a:false,ex:'正解は×。古代の日本では喪服に白が用いられていました。黒の喪服が一般化したのは明治以降、西洋の影響と葬儀の簡略化が進んでからのことです。'},
{g:'zatsu',type:'ox',q:'サッカーのワールドカップは原則として4年に一度開催される。',a:true,ex:'正解は○。FIFAワールドカップは4年ごとに開催されます。第1回は1930年のウルグアイ大会で、夏季五輪と同じ4年周期ながら開催年をずらして実施されています。'},
{g:'zatsu',type:'ox',q:'割り箸の起源には諸説あるが、もともとは使い捨てではなく繰り返し使う高級品だった。',a:false,ex:'正解は×。割り箸は誰も使っていない清潔さを示す使い捨ての箸として広まりました。新しく割って使うことで他人が口にしていない証になり、もてなしの心を表しました。'},
{g:'zatsu',type:'ox',q:'お辞儀のうち、最も深く頭を下げる丁寧なお辞儀を最敬礼という。',a:true,ex:'正解は○。お辞儀には会釈、敬礼、最敬礼の段階があり、最敬礼が最も深く上体を倒す丁寧な礼です。謝罪や深い感謝、儀礼の場で用いられます。'},
{g:'zatsu',type:'ox',q:'温度の単位である摂氏では、水が凍る温度を0度、沸騰する温度を100度としている。',a:true,ex:'正解は○。摂氏は1気圧のもとで水の凝固点を0度、沸点を100度と定めた目盛りです。考案者セルシウスの名から、記号にCが使われます。'},
{g:'zatsu',type:'ox',q:'ジャンケンで、グーはチョキに勝ち、チョキはパーに勝ち、パーはグーに勝つ。',a:true,ex:'正解は○。グーは石でチョキのはさみを壊し、チョキは紙を切り、パーは石を包むという三すくみの関係です。誰も絶対には勝てない巧妙な仕組みです。'},
{g:'zatsu',type:'ox',q:'バスケットボールの1チームがコート上でプレーする人数は5人である。',a:true,ex:'正解は○。バスケットボールは1チーム5人でプレーします。選手交代は何度でも可能で、ポジションはガード、フォワード、センターに大別されます。'},
{g:'zatsu',type:'ox',q:'結婚式でお祝いを包むご祝儀の金額は、割り切れる偶数が好まれる。',a:false,ex:'正解は×。割り切れる数は別れを連想させ縁起が悪いとされ、ご祝儀は3万や5万など奇数が好まれます。ただし8は末広がりで例外的に喜ばれることがあります。'},
{g:'zatsu',type:'ox',q:'タロットカードの大アルカナと呼ばれる絵札は全部で22枚ある。',a:true,ex:'正解は○。タロットは大アルカナ22枚と小アルカナ56枚の計78枚で構成されます。大アルカナには愚者や恋人、運命の輪など象徴的な絵柄が描かれています。'},
{g:'zatsu',type:'ox',q:'バーコードに使われる線の太さは一定で、太さによる意味の違いはない。',a:false,ex:'正解は×。バーコードは線と隙間の太さの組み合わせで数字を表します。太い線や細い線、間隔の幅がそれぞれ意味を持ち、機械が光で読み取って判別します。'},
{g:'zatsu',type:'ox',q:'ことわざの情けは人の為ならずは、人に親切にするのはその人のためにならないという意味である。',a:false,ex:'正解は×。本来は人に親切にすればめぐりめぐって自分に良い報いが返るという意味です。為ならずは自分の為であるという肯定の意で、本人を甘やかすという解釈は誤用です。'},
{g:'zatsu',type:'ox',q:'カクテルのマティーニはジンとベルモットを混ぜて作られるのが基本である。',a:true,ex:'正解は○。マティーニはジンにドライベルモットを加え、オリーブを添えるのが定番です。カクテルの王様とも呼ばれ、比率や作り方に飲み手のこだわりが表れます。'},
{g:'zatsu',type:'ox',q:'四十九日の法要は、亡くなった日を1日目として数えた49日目に行う。',a:true,ex:'正解は○。仏教では亡くなった日を1日目と数え、49日目に法要を営みます。この日に故人の行き先が定まるとされ、忌明けの大切な節目とされています。'},
{g:'zatsu',type:'ox',q:'ゴルフで規定打数より2打少なくホールアウトすることをバーディーという。',a:false,ex:'正解は×。規定打数より2打少ないのはイーグルです。1打少ないのがバーディー、3打少ないのはアルバトロスと呼ばれ、鳥の名にちなんだ呼称が並びます。'},
{g:'zatsu',type:'ox',q:'たい焼きとたこ焼きは、どちらも江戸時代から庶民に親しまれてきた食べ物である。',a:false,ex:'正解は×。たい焼きは明治期、たこ焼きは昭和初期に生まれたとされます。たこ焼きは大阪で誕生し、明石焼きをヒントにタコを入れたのが始まりといわれます。'},
{g:'zatsu',type:'ox',q:'時計の文字盤で、3時の位置には常にローマ数字のIIIが使われている。',a:false,ex:'正解は×。時計の文字盤は数字を使わない点表示や、4をIIIIと表記するものなど多様です。IIIIを使うのは見た目のバランスや慣習によるとされています。'},
{g:'zatsu',type:'ox',q:'駅伝という競技名は、昔の宿場をつないで荷物や情報を運んだ制度に由来する。',a:true,ex:'正解は○。駅伝は宿場ごとに馬や人を乗り継いだ古代の交通制度、駅伝制に由来します。たすきをつなぐ姿が宿場のリレーに重なるため命名されました。'},
{g:'zatsu',type:'ox',q:'地図の記号で、温泉を表すマークは湯気が立ちのぼる様子をかたどっている。',a:true,ex:'正解は○。温泉の地図記号は湯だまりとそこから立ちのぼる湯気を図案化したものです。三本の曲線が湯気を表し、誰が見ても直感的にわかるデザインです。'},
{g:'zatsu',type:'ox',q:'ラグビーで、トライを決めると得点が入る。',a:true,ex:'正解は○。ラグビーでは相手陣のインゴールにボールを地面につけるトライで得点します。トライ後にはゴールキックの権利が得られ、追加点を狙えます。'},
{g:'zatsu',type:'ox',q:'数字の単位で、一の上は十、百、千ときて、その次は万である。',a:true,ex:'正解は○。日本語の数の単位は千の次が万で、万の上は億、兆と続きます。四桁ごとに新しい単位に切り替わるのが日本式の数え方の特徴です。'},
{g:'zatsu',type:'ox',q:'国際電話で日本にかけるときの国番号は81である。',a:true,ex:'正解は○。日本の国番号は81です。国番号は国や地域ごとに割り当てられ、海外から日本へかけるときは頭の0を除いた番号の前に81を付けます。'},
{g:'zatsu',type:'ox',q:'こけしは、もともと東北地方の温泉地で土産物として作られた木の人形である。',a:true,ex:'正解は○。こけしは江戸後期に東北の温泉地で湯治客向けの土産として作られた木製人形です。産地ごとに形や模様の系統があり、伝統工芸として今も親しまれています。'},
{g:'zatsu',type:'ox',q:'バドミントンで使うシャトルの羽根には、本来は水鳥の羽が使われている。',a:true,ex:'正解は○。本格的なシャトルにはガチョウやアヒルなど水鳥の羽根が使われ、コルクの台に差し込まれています。練習用には合成樹脂製のものも広く用いられます。'},
{g:'zatsu',type:'ox',q:'のし袋の水引で、結び切りは何度あってもよいお祝い事に用いる。',a:false,ex:'正解は×。結び切りはほどけにくい結びで、結婚や弔事など繰り返さない方がよい場面に使います。何度あってもよいお祝いには、ほどいて結び直せる蝶結びを使います。'},
{g:'zatsu',type:'ox',q:'手紙の最後に書く敬具は、頭語に拝啓を使ったときに対応して用いる結語である。',a:true,ex:'正解は○。手紙では拝啓で始めたら敬具で結ぶのが基本の組み合わせです。より丁寧な場合は謹啓と謹言を対にし、頭語と結語の組み合わせには決まりがあります。'},
{g:'zatsu',type:'ox',q:'1ダースは12個を指す数え方である。',a:true,ex:'正解は○。1ダースは12個です。鉛筆や卵などをまとめる単位として使われ、12ダースをまとめた144個はグロスと呼ばれます。'},
{g:'zatsu',type:'ox',q:'お神酒は神前に供えたあとに参拝者がいただくことで、神の力を分けてもらう意味がある。',a:true,ex:'正解は○。神に供えた酒や食べ物をいただくことを直会といい、神の恵みを分かち合う行為とされます。お神酒も同様に、神とのつながりを感じる意味があります。'},
{g:'zatsu',type:'ox',q:'モーニングコールという言葉は、和製英語ではなく英語圏でもそのまま通じる。',a:false,ex:'正解は×。ホテルで時間に電話で起こすサービスを英語ではウェイクアップコールと呼びます。モーニングコールは日本で広まった和製英語的な表現です。'},
{g:'zatsu',type:'ox',q:'競馬で、1着から3着までの着順を順番通りに当てる賭け式を三連単という。',a:true,ex:'正解は○。三連単は1着から3着を着順通りに当てる馬券で、的中が難しいぶん配当も大きくなります。順不同で当てる場合は三連複と呼ばれます。'},
{g:'zatsu',type:'ox',q:'年賀状で、相手が喪中の場合でも例年通り賀状を出すのがマナーとされる。',a:false,ex:'正解は×。相手が喪中の場合は年賀状を控えるのがマナーです。代わりに松の内が明けてから寒中見舞いを出すなどして、相手を気遣う心づかいが大切です。'},
{g:'zatsu',type:'ox',q:'卓球の試合は、現在では1ゲーム11点先取で行われるのが基本である。',a:true,ex:'正解は○。卓球は2001年のルール改正で1ゲーム21点制から11点制になりました。10対10になるとデュースとなり、2点差がつくまで続きます。'},
{g:'zatsu',type:'choice',q:'相撲の最高位である地位はどれでしょう？',ch:['大関','関脇','横綱','小結'],a:2,ex:'正解は横綱。番付の最高位で、強さに加えて品格も求められる別格の地位です。横綱は負け越しても降格せず、引退するのみという特別な立場にあります。'},
{g:'zatsu',type:'choice',q:'結婚25周年を祝う記念は何婚式と呼ばれるでしょう？',ch:['真珠婚式','銀婚式','金婚式','ダイヤモンド婚式'],a:1,ex:'正解は銀婚式。25周年が銀婚式、50周年が金婚式です。30周年は真珠婚式、60周年はダイヤモンド婚式と、年数ごとに素材にちなんだ呼び名があります。'},
{g:'zatsu',type:'choice',q:'ボウリングで2投連続でストライクを出すことを何と呼ぶでしょう？',ch:['ターキー','ダブル','スプリット','ガター'],a:1,ex:'正解はダブル。連続ストライクはダブル、3連続でターキーと呼ばれます。スプリットはピンが離れて残った難しい配置、ガターは溝に落とすことです。'},
{g:'zatsu',type:'choice',q:'七福神のうち、唯一の女性の神様は誰でしょう？',ch:['恵比寿','大黒天','弁財天','福禄寿'],a:2,ex:'正解は弁財天。七福神で唯一の女神で、琵琶を持ち音楽や芸能、財福をつかさどります。もとはインドの河の女神サラスバティーが起源とされています。'},
{g:'zatsu',type:'choice',q:'コーヒーのカフェオレとカフェラテの主な違いは何でしょう？',ch:['砂糖の有無','使うコーヒーの種類','豆の産地','カップの大きさ'],a:1,ex:'正解は使うコーヒーの種類。カフェオレはドリップコーヒーに牛乳、カフェラテはエスプレッソに牛乳を加えたものです。オレはフランス語、ラテはイタリア語の牛乳に由来します。'},
{g:'zatsu',type:'choice',q:'お寿司屋さんの符牒で、しょうゆのことを何と呼ぶでしょう？',ch:['ガリ','むらさき','あがり','シャリ'],a:1,ex:'正解はむらさき。しょうゆの色からむらさきと呼びます。ガリは生姜の甘酢漬け、あがりはお茶、シャリは酢飯を指す寿司屋ならではの言葉です。'},
{g:'zatsu',type:'choice',q:'ことわざの弘法にも筆の誤りと同じ意味を持つのはどれでしょう？',ch:['猿も木から落ちる','石の上にも三年','急がば回れ','二兎を追う者は一兎をも得ず'],a:0,ex:'正解は猿も木から落ちる。どちらも名人や得意な人でも失敗することがあるという意味です。河童の川流れも同じ意味のことわざとして知られています。'},
{g:'zatsu',type:'choice',q:'バレーボールで1チームがコート上に立つ選手の人数は何人でしょう？',ch:['5人','6人','7人','9人'],a:1,ex:'正解は6人。現在の6人制バレーが主流です。守備専門のリベロという特別なポジションがあり、選手交代の扱いが他とは異なる特例で運用されています。'},
{g:'zatsu',type:'choice',q:'長さの単位で、1インチはおよそ何センチメートルでしょう？',ch:['約1.5センチ','約2.5センチ','約3.5センチ','約5センチ'],a:1,ex:'正解は約2.5センチ。正確には2.54センチメートルです。テレビやタイヤのサイズなどで使われ、12インチで1フィートとなります。'},
{g:'zatsu',type:'choice',q:'おみくじで、大吉と凶の間にあるとされる運勢はどれでしょう？',ch:['超吉','中吉','大大吉','特凶'],a:1,ex:'正解は中吉。一般に大吉、中吉、小吉、吉、末吉、凶などの段階があります。並び順は神社によって異なり、吉と末吉のどちらが上かは社で見解が分かれます。'},
{g:'zatsu',type:'choice',q:'喫茶店で出されるブレンドコーヒーのブレンドとは何を意味するでしょう？',ch:['濃さの調整','複数の豆の配合','焙煎の方法','産地の名前'],a:1,ex:'正解は複数の豆の配合。性質の異なる豆を混ぜ合わせ、味のバランスを整えたものです。単一産地の豆だけで淹れるものはストレートコーヒーと呼ばれます。'},
{g:'zatsu',type:'choice',q:'トランプ52枚の数字をすべて足すといくつになるでしょう？',ch:['340','364','390','416'],a:1,ex:'正解は364。1から13までの合計91に4つのマークを掛けて364です。これに近い数として1年の日数365がよく引き合いに出されます。'},
{g:'zatsu',type:'choice',q:'お見舞いの品として、避けた方がよいとされる花はどれでしょう？',ch:['ガーベラ','鉢植えの花','ひまわり','カーネーション'],a:1,ex:'正解は鉢植えの花。根がつく鉢植えは寝つくに通じ、病が長引くと縁起を担いで避けられます。香りの強い花や、死を連想させる花も控えるのが無難です。'},
{g:'zatsu',type:'choice',q:'アメリカンフットボールで、エンドゾーンにボールを持ち込んで得る6点の得点を何というでしょう？',ch:['フィールドゴール','タッチダウン','セーフティ','タッチバック'],a:1,ex:'正解はタッチダウン。相手のエンドゾーンにボールを持ち込むと6点入ります。その後トライフォーポイントで追加点を狙え、キックの成功で1点が加わります。'},
{g:'zatsu',type:'choice',q:'重さの単位で、1カラットは何ミリグラムでしょう？',ch:['100ミリグラム','200ミリグラム','500ミリグラム','1000ミリグラム'],a:1,ex:'正解は200ミリグラム。宝石の重さを表すカラットは0.2グラムです。語源はイナゴマメの種子で、昔この種が重さの基準として使われたことに由来します。'},
{g:'zatsu',type:'choice',q:'箸の使い方で、料理に箸を突き立てる行為を何と呼び嫌われるでしょう？',ch:['迷い箸','立て箸','寄せ箸','刺し箸'],a:1,ex:'正解は立て箸。ご飯に箸を突き立てる立て箸は、仏前の枕飯を連想させるため強く嫌われます。料理の上で箸を迷わせる迷い箸なども無作法とされます。'},
{g:'zatsu',type:'choice',q:'クラシックバレエの基本となる足のポジションは全部でいくつあるでしょう？',ch:['3つ','5つ','7つ','9つ'],a:1,ex:'正解は5つ。バレエの足のポジションは第1から第5までの5種類が基本です。腕にも対応するポジションがあり、すべての動きの出発点となります。'},
{g:'zatsu',type:'choice',q:'お正月の鏡餅の上に乗せる果実は伝統的に何でしょう？',ch:['みかん','柚子','橙','金柑'],a:2,ex:'正解は橙。代々家が栄えるという語呂合わせから、本来は橙を飾ります。実が落ちずに長く木に残ることも縁起がよいとされ、今はみかんで代用されることも多いです。'},
{g:'zatsu',type:'choice',q:'マラソンの距離の由来となった、伝令が走ったとされる古代ギリシャの地名はどれでしょう？',ch:['アテネ','スパルタ','マラトン','オリンピア'],a:2,ex:'正解はマラトン。マラトンの戦いの勝利を伝えるため兵士がアテネまで走った故事が由来とされます。マラトンという地名がそのまま競技名マラソンになりました。'},
{g:'zatsu',type:'choice',q:'日本の硬貨のうち、穴が開いているのはどれとどれでしょう？',ch:['1円と5円','5円と50円','10円と100円','50円と500円'],a:1,ex:'正解は5円と50円。穴が開いているのは5円玉と50円玉です。穴には他の硬貨と区別しやすくする目的や、偽造防止、材料節約の意味があるとされます。'},
{g:'zatsu',type:'choice',q:'ことわざで、二階から目薬と最も近い意味を持つのはどれでしょう？',ch:['焼け石に水','月とすっぽん','棚からぼたもち','瓢箪から駒'],a:0,ex:'正解は焼け石に水。二階から目薬は、もどかしく効果がないことのたとえです。焼け石に水も努力が足りず効き目がないことを表し、近い意味になります。'},
{g:'zatsu',type:'choice',q:'喪中はがきを出す時期として最も適切なのはいつごろでしょう？',ch:['12月下旬','11月から12月初旬','1月中旬','喪明け後すぐ'],a:1,ex:'正解は11月から12月初旬。相手が年賀状を準備する前に届くよう、11月から12月初旬に出すのが目安です。年賀欠礼を知らせる挨拶状なので早めの配慮が大切です。'},
{g:'zatsu',type:'choice',q:'カクテルのソルティードッグで、グラスの縁につけるものは何でしょう？',ch:['砂糖','塩','レモンの皮','シナモン'],a:1,ex:'正解は塩。ソルティードッグはグラスの縁に塩をつけるスノースタイルが特徴です。ソルティーは塩辛いの意で、ウォッカとグレープフルーツジュースで作ります。'},
{g:'zatsu',type:'choice',q:'囲碁で、盤の交点の数は縦横それぞれ何本の線が交わってできるでしょう？',ch:['17本','19本','21本','23本'],a:1,ex:'正解は19本。碁盤は縦横19本の線が交わり、交点は361か所あります。石はこの交点に置いていき、盤面の中心の点は天元と呼ばれます。'},
{g:'zatsu',type:'choice',q:'お中元を贈る時期として一般的なのはいつごろでしょう？',ch:['3月から4月','7月初旬から中旬','9月','12月'],a:1,ex:'正解は7月初旬から中旬。お中元は半年の感謝を込めて夏に贈る習慣で、関東では7月初旬から15日ごろが目安です。時期を過ぎると暑中見舞いとして贈ります。'},
{g:'zatsu',type:'choice',q:'フィギュアスケートのジャンプで、後ろ向きに踏み切るジャンプの一つはどれでしょう？',ch:['アクセル','サルコウ','フリップとルッツのみ','すべて前向き'],a:1,ex:'正解はサルコウ。アクセルだけが前向きに踏み切る特殊なジャンプで、サルコウやループなど他のジャンプは後ろ向きに踏み切ります。考案者の名がついた跳び方です。'},
{g:'zatsu',type:'choice',q:'食事のマナーで、和食において汁物の椀を持ち上げて食べるのは？',ch:['無作法とされる','正しい作法とされる','地域によって禁止','子どもだけ許される'],a:1,ex:'正解は正しい作法とされる。和食では飯椀や汁椀を手に持って食べるのが基本の作法です。一方、洋食では皿を持ち上げないのがマナーで、文化により作法が異なります。'},
{g:'zatsu',type:'choice',q:'時間の単位で、1時間は何秒でしょう？',ch:['360秒','3600秒','6000秒','36000秒'],a:1,ex:'正解は3600秒。1時間は60分、1分は60秒なので、掛け合わせて3600秒です。時間を秒に換算する60進法は、古代バビロニアの数え方に由来するとされます。'},
{g:'zatsu',type:'choice',q:'落語で、噺の最後を締めくくる笑いどころを何と呼ぶでしょう？',ch:['まくら','オチ','くすぐり','見台'],a:1,ex:'正解はオチ。落語は本題に入る前のまくらから始まり、最後のオチで締めくくります。サゲとも呼ばれ、観客の意表を突く言葉遊びや勘違いが定番です。'},
{g:'zatsu',type:'choice',q:'お祝いののし袋にかける水引で、お祝い事に使う色の組み合わせはどれでしょう？',ch:['黒白','黄白','紅白','銀一色'],a:2,ex:'正解は紅白。慶事には紅白や金銀の水引を使います。黒白や双銀、地域によっては黄白の水引は弔事に用いるもので、色の使い分けにも意味があります。'},
{g:'zatsu',type:'choice',q:'競泳の自由形で、ほとんどの選手が実際に泳ぐ泳法はどれでしょう？',ch:['平泳ぎ','背泳ぎ','クロール','バタフライ'],a:2,ex:'正解はクロール。自由形は泳法が自由ですが、最も速いクロールがほぼ選ばれます。なお個人メドレーなどではすでに使った泳法以外という制限がかかります。'},
{g:'zatsu',type:'choice',q:'紙のサイズで、A4の紙を半分に折ると何のサイズになるでしょう？',ch:['A3','A5','B4','B5'],a:1,ex:'正解はA5。A判は半分に折るごとに番号が一つ増えます。A4の半分がA5、A4を2枚分の大きさがA3です。縦横比は常に1対ルート2に保たれています。'},
{g:'zatsu',type:'choice',q:'ことわざの濡れ手で粟の意味として正しいのはどれでしょう？',ch:['苦労が水の泡になる','骨折り損になる','苦労せず利益を得る','油断して失敗する'],a:2,ex:'正解は苦労せず利益を得る。濡れた手で粟をつかむと粒が多くつくことから、たやすく多くの利益を得るたとえです。泡ではなく穀物の粟が正しい字です。'},
{g:'zatsu',type:'choice',q:'ワインで、製造に使うブドウの収穫年のことを何と呼ぶでしょう？',ch:['テロワール','ヴィンテージ','タンニン','デキャンタ'],a:1,ex:'正解はヴィンテージ。ワインのブドウ収穫年をヴィンテージといいます。気候で味が変わるため当たり年が重視され、テロワールは土地の個性を指す別の言葉です。'},
{g:'zatsu',type:'choice',q:'柔道で、最も高い段位の帯の色は何色でしょう？',ch:['黒','茶','紅','白'],a:2,ex:'正解は紅。一般に黒帯が高段者の象徴ですが、さらに上の九段と十段では紅帯を締めます。六段から八段では紅白のだんだら帯を用いることもあります。'},
{g:'zatsu',type:'choice',q:'お盆に故人の霊を迎えるために焚く火を何と呼ぶでしょう？',ch:['送り火','迎え火','灯篭','護摩'],a:1,ex:'正解は迎え火。お盆の入りに先祖の霊を迎えるため門口で焚くのが迎え火、終わりに送り出すのが送り火です。京都の大文字焼きは送り火の一例として有名です。'},
{g:'zatsu',type:'choice',q:'1海里はおよそ何メートルでしょう？',ch:['約1000メートル','約1852メートル','約2500メートル','約3000メートル'],a:1,ex:'正解は約1852メートル。海里は緯度1分の弧の長さに由来する海上の距離単位です。1時間に1海里進む速さを1ノットといい、船や航空の世界で使われます。'},
{g:'zatsu',type:'choice',q:'歌舞伎で、見せ場で役者が動きを止めて目を寄せる演出を何と呼ぶでしょう？',ch:['見得','隈取','花道','黒衣'],a:0,ex:'正解は見得。役者が一瞬静止し力強い表情を見せる演出が見得です。隈取は顔の化粧、花道は客席を貫く通路、黒衣は舞台で役者を助ける裏方を指します。'},
{g:'zatsu',type:'choice',q:'お祝いの席で配る紅白まんじゅうの色には、それぞれ意味があるとされます。紅はめでたさを表しますが、白が表すとされるのは何でしょう？',ch:['悲しみ','神聖さや清浄','質素','長寿'],a:1,ex:'正解は神聖さや清浄。紅白は古くから縁起のよい配色で、紅は魔除けやめでたさ、白は神聖さや清らかさを表すとされます。慶事の定番の組み合わせです。'},
{g:'zatsu',type:'choice',q:'ボクシングで、3分間の戦いの単位を何と呼ぶでしょう？',ch:['セット','ピリオド','ラウンド','イニング'],a:2,ex:'正解はラウンド。ボクシングは1ラウンド3分が基本で、間に1分の休憩を挟みます。プロのタイトルマッチは長く、複数ラウンドにわたって戦われます。'},
{g:'zatsu',type:'choice',q:'食パン1斤のおおよその重さの目安として正しいのはどれでしょう？',ch:['約100グラム','約340グラム以上','約1キログラム','約2キログラム'],a:1,ex:'正解は約340グラム以上。包装食パンの1斤は340グラム以上と表示の基準で定められています。斤はもともと尺貫法の重さの単位で、パンに転用されたものです。'},
{g:'zatsu',type:'choice',q:'香典袋の表書きで、仏式の通夜や葬儀に一般的に使われるのはどれでしょう？',ch:['御霊前','御祝','寿','御中元'],a:0,ex:'正解は御霊前。仏式の通夜や葬儀では御霊前が広く使えます。四十九日以降は御仏前を用いるなど、宗派や時期で表書きが変わる点に注意が必要です。'},
{g:'zatsu',type:'choice',q:'チェスで、相手のキングを詰ませて勝つことを何というでしょう？',ch:['ステイルメイト','チェックメイト','キャスリング','プロモーション'],a:1,ex:'正解はチェックメイト。キングが逃げられない状態に追い込むのがチェックメイトです。語源はペルシャ語で王は死んだの意味とされ、将棋の詰みにあたります。'},
{g:'zatsu',type:'choice',q:'日本茶の玉露と煎茶の主な違いとして正しいのはどれでしょう？',ch:['発酵の度合い','栽培時の日光の当て方','葉の産地','収穫する季節'],a:1,ex:'正解は栽培時の日光の当て方。玉露は収穫前に覆いをして日光を遮り育てるため、うまみが強く渋みが抑えられます。煎茶は日光を浴びて育つので爽やかな味わいです。'},
{g:'zatsu',type:'choice',q:'ことわざの転ばぬ先の杖が表す意味はどれでしょう？',ch:['失敗から学ぶこと','前もって準備すること','過去を悔やむこと','人に頼ること'],a:1,ex:'正解は前もって準備すること。転ぶ前に杖を用意するように、失敗しないよう事前に備える大切さを説くことわざです。備えあれば憂いなしと同じ趣旨です。'},
{g:'zatsu',type:'choice',q:'西洋の食事マナーで、食事中に一時的に手を休めるときのナイフとフォークの置き方はどれでしょう？',ch:['皿の右に揃える','ハの字に皿の上に置く','皿の外に出す','立てかけて置く'],a:1,ex:'正解はハの字に皿の上に置く。食事の途中はナイフとフォークをハの字に置き、食べ終わりは揃えて斜めに置くのが合図です。店員はこれを見て下げる判断をします。'},
{g:'zatsu',type:'choice',q:'体操競技の床運動を行う正方形のマットの一辺は、およそ何メートルでしょう？',ch:['約8メートル','約10メートル','約12メートル','約15メートル'],a:2,ex:'正解は約12メートル。床運動は12メートル四方の演技スペースで行います。ラインを越えると減点となるため、跳躍の着地位置の調整も技術のうちです。'},
{g:'zatsu',type:'choice',q:'記号のアットマークは、もともとどんな意味で使われていた記号でしょう？',ch:['電話番号の区切り','単価をあらわす商業記号','時刻の表示','住所の略号'],a:1,ex:'正解は単価をあらわす商業記号。アットマークは1個あたりいくらという単価を示す商業用の記号でした。電子メールの普及でアドレスの区切り記号として広く知られるようになりました。'},
{g:'zatsu',type:'choice',q:'神社で参拝する際の基本的な作法として一般的なのはどれでしょう？',ch:['二礼二拍手一礼','三礼一拍手','一礼三拍手','拍手はしない'],a:0,ex:'正解は二礼二拍手一礼。多くの神社では二回お辞儀し、二回手を打ち、最後に一礼します。出雲大社など一部では拍手の回数が異なる独自の作法があります。'},
{g:'zatsu',type:'choice',q:'カーリングで、投げた石の進路を整えるために氷をこする道具を何と呼ぶでしょう？',ch:['パドル','ブラシ','スティック','ラケット'],a:1,ex:'正解はブラシ。選手がブラシで氷を掃くスウィーピングで石の滑りや曲がりを調整します。氷の表面をこすって摩擦を減らし、石を遠くまで進ませる効果があります。'},
{g:'zatsu',type:'choice',q:'長寿の祝いで、88歳を祝うことを何というでしょう？',ch:['還暦','古希','米寿','白寿'],a:2,ex:'正解は米寿。米の字を分けると八十八になることから、88歳の祝いを米寿と呼びます。60歳は還暦、70歳は古希、99歳は白寿と、年齢ごとに名称があります。'},
{g:'zatsu',type:'choice',q:'ことわざの船頭多くして船山に登るが教える内容はどれでしょう？',ch:['指図する人が多いと物事がうまくいかない','努力すれば不可能も可能になる','協力すれば大きな力になる','経験者の意見は貴重だ'],a:0,ex:'正解は指図する人が多いと物事がうまくいかない。命令する者が多すぎると統一がとれず、見当違いの方向に進むという戒めです。船が山に登る滑稽な様で表しています。'},

{g:'chiri',type:'ox',q:'世界で最も面積が大きい国はロシアである。',a:true,ex:'ロシアの面積は約1710万平方キロメートルで世界第1位。2位のカナダの2倍近い広さを持つ。'},
{g:'chiri',type:'ox',q:'アフリカ大陸で最も高い山はキリマンジャロである。',a:true,ex:'キリマンジャロはタンザニアにあり標高5895メートル。アフリカ最高峰で、赤道近くにありながら山頂には氷河が見られる。'},
{g:'chiri',type:'ox',q:'ナイル川は世界で最も長い川である。',a:true,ex:'ナイル川は約6650キロメートルで一般に世界最長とされる。アマゾン川と長さ第1位を争うことがあるが、定説ではナイル川が最長。'},
{g:'chiri',type:'ox',q:'オーストラリアの首都はシドニーである。',a:false,ex:'オーストラリアの首都はキャンベラ。シドニーやメルボルンが大都市だが、両都市の対立を避けて中間にキャンベラが建設された。'},
{g:'chiri',type:'ox',q:'カナダの首都はオタワである。',a:true,ex:'カナダの首都はオタワ。トロントやモントリオールの方が人口は多いが、首都機能はオタワに置かれている。'},
{g:'chiri',type:'ox',q:'世界で最も深い湖はバイカル湖である。',a:true,ex:'ロシアのバイカル湖は最大水深約1642メートルで世界最深の湖。世界の淡水の約2割を蓄えるとされる。'},
{g:'chiri',type:'ox',q:'死海は海面より高い位置にある。',a:false,ex:'死海の水面は海面下約430メートルにあり、地表で最も低い場所として知られる。塩分濃度が高く人が浮きやすい。'},
{g:'chiri',type:'ox',q:'赤道はアマゾン川河口を通っている。',a:false,ex:'アマゾン川河口は赤道のすぐ近くを流れるが、赤道はブラジル北部を通る。河口そのものは赤道よりわずかに南側にある。'},
{g:'chiri',type:'ox',q:'日本の最高峰は富士山である。',a:true,ex:'富士山は標高3776メートルで日本最高峰。静岡県と山梨県にまたがる成層火山で、2013年に世界文化遺産に登録された。'},
{g:'chiri',type:'ox',q:'琵琶湖は日本最大の湖である。',a:true,ex:'滋賀県の琵琶湖は面積約670平方キロメートルで日本最大の湖。県面積の約6分の1を占める。'},
{g:'chiri',type:'choice',q:'世界で最も人口が多い国は次のうちどれか？',ch:['中国','インド','アメリカ','インドネシア'],a:1,ex:'2023年に国連がインドの人口が中国を上回り世界第1位になったと発表した。インドの人口は約14億人を超える。'},
{g:'chiri',type:'choice',q:'世界で2番目に面積が大きい国はどれか？',ch:['アメリカ','中国','カナダ','ブラジル'],a:2,ex:'カナダの面積は約998万平方キロメートルで世界第2位。3位アメリカ、4位中国とほぼ同規模で続く。'},
{g:'chiri',type:'choice',q:'南アメリカ大陸を縦断する世界最長の山脈はどれか？',ch:['ロッキー山脈','アンデス山脈','ヒマラヤ山脈','アルプス山脈'],a:1,ex:'アンデス山脈は約7000キロメートルにわたり南米西岸を縦断する世界最長の山脈。最高峰はアコンカグア。'},
{g:'chiri',type:'choice',q:'世界最大の砂漠であるサハラ砂漠が広がる大陸はどれか？',ch:['アジア','アフリカ','オーストラリア','南アメリカ'],a:1,ex:'サハラ砂漠はアフリカ北部に広がる世界最大の砂漠で、面積は約900万平方キロメートル。ほぼアメリカ本土に匹敵する。'},
{g:'chiri',type:'choice',q:'世界最大の島はどれか？',ch:['グリーンランド','ニューギニア島','ボルネオ島','マダガスカル島'],a:0,ex:'グリーンランドは面積約217万平方キロメートルで世界最大の島。オーストラリアは大陸とされるため島には含めない。'},
{g:'chiri',type:'choice',q:'エベレストがそびえる山脈はどれか？',ch:['カラコルム山脈','アンデス山脈','ヒマラヤ山脈','テンシャン山脈'],a:2,ex:'エベレストは標高8849メートルで世界最高峰。ヒマラヤ山脈にあり、ネパールと中国の国境に位置する。'},
{g:'chiri',type:'choice',q:'次のうち内陸国はどれか？',ch:['ポルトガル','スイス','デンマーク','ギリシャ'],a:1,ex:'スイスはアルプス山中の内陸国で海に面していない。永世中立国として知られ、多くの国際機関の本部が置かれる。'},
{g:'chiri',type:'choice',q:'世界最大の流域面積を持つ川はどれか？',ch:['ナイル川','長江','アマゾン川','ミシシッピ川'],a:2,ex:'アマゾン川は流域面積約705万平方キロメートルで世界最大。水量も世界最大で、世界の河川流量の約2割を占める。'},
{g:'chiri',type:'choice',q:'イタリアの首都ローマを流れる川はどれか？',ch:['ポー川','テベレ川','アルノ川','ドナウ川'],a:1,ex:'ローマはテベレ川沿いに発展した古代都市。ポー川は北イタリア、アルノ川はフィレンツェを流れる。'},
{g:'chiri',type:'choice',q:'カスピ海が面していない国はどれか？',ch:['ロシア','イラン','トルコ','カザフスタン'],a:2,ex:'カスピ海に面するのはロシア、イラン、カザフスタン、トルクメニスタン、アゼルバイジャンの5か国。トルコは面していない。'},
{g:'chiri',type:'ox',q:'世界で最も面積が小さい独立国はバチカン市国である。',a:true,ex:'バチカン市国は面積約0.44平方キロメートルで世界最小の独立国。ローマ市内にあり、カトリックの総本山。'},
{g:'chiri',type:'ox',q:'パナマ運河は太平洋と大西洋を結んでいる。',a:true,ex:'パナマ運河は太平洋とカリブ海すなわち大西洋側を結ぶ。1914年に開通し、船は閘門で水位を調整しながら通過する。'},
{g:'chiri',type:'ox',q:'スエズ運河は地中海と紅海を結んでいる。',a:true,ex:'スエズ運河は1869年に開通し、地中海と紅海を結ぶ。アフリカ大陸を回らずアジアとヨーロッパを結ぶ重要航路。'},
{g:'chiri',type:'ox',q:'本初子午線が通る都市はパリである。',a:false,ex:'本初子午線すなわち経度0度はロンドン郊外のグリニッジ天文台を通る。1884年の国際会議で定められた。'},
{g:'chiri',type:'ox',q:'ブラジルの公用語はスペイン語である。',a:false,ex:'ブラジルの公用語はポルトガル語。南米の大半はスペイン語圏だが、ブラジルだけは植民地時代の名残でポルトガル語を使う。'},
{g:'chiri',type:'ox',q:'富士山は活火山に分類されている。',a:true,ex:'富士山は現在も活火山に分類される。最後の噴火は1707年の宝永噴火で、江戸にも火山灰が降った。'},
{g:'chiri',type:'ox',q:'日本で最も長い川は利根川である。',a:false,ex:'日本最長の川は信濃川で約367キロメートル。利根川は流域面積が日本最大で長さは第2位。'},
{g:'chiri',type:'ox',q:'北海道は日本で最も面積の大きい都道府県である。',a:true,ex:'北海道の面積は約8.3万平方キロメートルで日本の都道府県中最大。日本の総面積の約2割を占める。'},
{g:'chiri',type:'ox',q:'日本の標準時子午線は兵庫県明石市を通る。',a:true,ex:'日本標準時は東経135度の子午線を基準とし、これは兵庫県明石市などを通る。世界標準時より9時間進んでいる。'},
{g:'chiri',type:'ox',q:'四国で最も人口が多い県は愛媛県である。',a:true,ex:'四国4県のうち愛媛県が最も人口が多い。県庁所在地の松山市は四国最大の都市である。'},
{g:'chiri',type:'choice',q:'アメリカ合衆国で最も人口が多い都市はどれか？',ch:['ロサンゼルス','シカゴ','ニューヨーク','ヒューストン'],a:2,ex:'ニューヨーク市はアメリカ最大の都市で人口約800万人。経済と文化の中心地で、国連本部も置かれている。'},
{g:'chiri',type:'choice',q:'世界で最も標高が高い首都はどれか？',ch:['ラパス','ボゴタ','キト','メキシコシティ'],a:0,ex:'ボリビアの事実上の首都ラパスは標高約3600メートルで世界最高所の首都。憲法上の首都はスクレ。'},
{g:'chiri',type:'choice',q:'ヨーロッパで最も長い川はどれか？',ch:['ドナウ川','ライン川','ボルガ川','セーヌ川'],a:2,ex:'ボルガ川はロシアを流れる約3690キロメートルのヨーロッパ最長の川。カスピ海に注ぐ。'},
{g:'chiri',type:'choice',q:'次のうちアフリカ大陸の国でないのはどれか？',ch:['モロッコ','エチオピア','イエメン','ナミビア'],a:2,ex:'イエメンはアラビア半島南端の国でアジアに属する。紅海を挟んでアフリカ大陸と向かい合っている。'},
{g:'chiri',type:'choice',q:'世界で最も人口密度が高いことで知られる都市国家はどれか？',ch:['シンガポール','モナコ','バチカン','サンマリノ'],a:1,ex:'モナコは面積約2平方キロメートルに人口が密集し、世界有数の人口密度を誇る都市国家。カジノで有名。'},
{g:'chiri',type:'choice',q:'五大湖のうちアメリカとカナダの国境にないのはどれか？',ch:['スペリオル湖','ミシガン湖','ヒューロン湖','エリー湖'],a:1,ex:'ミシガン湖は五大湖の中で唯一アメリカ国内のみにある湖。他の4つはアメリカとカナダの国境にまたがる。'},
{g:'chiri',type:'choice',q:'北極点を中心とした海はどれか？',ch:['北極海','バルト海','ベーリング海','ノルウェー海'],a:0,ex:'北極点は北極海の海上にある。南極点が南極大陸という陸地にあるのと対照的で、北極には大陸がない。'},
{g:'chiri',type:'choice',q:'世界で最も多くの国と国境を接している国はどれか？',ch:['ロシア','中国','ブラジル','ドイツ'],a:0,ex:'ロシアと中国はともに14か国と接するが、ロシアが最多級とされる。広大な国土ゆえに多くの隣国を持つ。'},
{g:'chiri',type:'choice',q:'アンコールワット遺跡がある国はどれか？',ch:['タイ','ミャンマー','カンボジア','ベトナム'],a:2,ex:'アンコールワットはカンボジアにあるクメール王朝のヒンドゥー教寺院遺跡。同国の国旗にも描かれている。'},
{g:'chiri',type:'choice',q:'マチュピチュ遺跡がある国はどれか？',ch:['メキシコ','ペルー','ボリビア','チリ'],a:1,ex:'マチュピチュはペルーのアンデス山中にあるインカ帝国の遺跡。標高約2400メートルの尾根に築かれた空中都市。'},
{g:'chiri',type:'ox',q:'チベット高原は世界の屋根と呼ばれる。',a:true,ex:'チベット高原は平均標高4000メートルを超え、世界の屋根と呼ばれる。多くの大河の源流となっている。'},
{g:'chiri',type:'ox',q:'地中海はジブラルタル海峡で大西洋とつながっている。',a:true,ex:'地中海はスペインとモロッコの間のジブラルタル海峡で大西洋と通じる。海峡の幅は最も狭い所で約14キロメートル。'},

const QUIZ_LEN = 10; // 1ゲームの出題数

// ===== アプリ状態 =====
let state = {
  screen:'top',
  order:[],     // 出題する問題インデックスの配列
  pos:0,        // 現在何問目か(0始まり)
  correctCount:0,
  combo:0,
  maxCombo:0,
  answered:false,
  lastCorrect:false,
  lastPicked:null,
  countdown:0
};

// ===== LocalStorage =====
function loadStats(){
  try{const d=localStorage.getItem('ultraquiz_stats');return d?JSON.parse(d):null;}catch(e){return null;}
}
function saveStats(s){try{localStorage.setItem('ultraquiz_stats',JSON.stringify(s));}catch(e){}}
function getStats(){
  let s=loadStats();
  if(!s){s={hiScore:0,plays:0,totalQ:0,totalCorrect:0};saveStats(s);}
  return s;
}

// ===== 効果音（Web Audio APIでプログラム生成。外部ファイル不使用） =====
let audioCtx = null;      // AudioContextは使い回す（毎回newしない）
let soundOn = true;       // 音オン/オフ
try{ const sv=localStorage.getItem('ultraquiz_sound'); if(sv!==null) soundOn = sv==='1'; }catch(e){}

let masterGain = null;    // 全体音量＆クリッピング防止用のマスター段

// ユーザー操作時に呼ぶ：AudioContextを生成 or resume（iOS Safari対策）
function ensureAudio(){
  try{
    if(!audioCtx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      audioCtx = new AC();
      // マスターゲイン → コンプレッサーで全体をまとめ、派手でも歪まないようにする
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.8;
      let out = masterGain;
      try{
        const comp = audioCtx.createDynamicsCompressor();
        comp.threshold.value = -10;
        comp.knee.value = 24;
        comp.ratio.value = 12;
        comp.attack.value = 0.003;
        comp.release.value = 0.25;
        masterGain.connect(comp);
        out = comp;
      }catch(e){}
      out.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended'){ audioCtx.resume(); }
  }catch(e){}
}

// 出力先（マスター段があればそこへ。無ければ直結）
function audioDest(){ return masterGain || (audioCtx && audioCtx.destination); }

// 単音を鳴らすヘルパー（周波数・開始/継続時間・波形・音量・任意でビブラート/終端周波数）
function playTone(freq, start, dur, type, vol, opt){
  if(!audioCtx) return;
  opt = opt || {};
  const t0 = audioCtx.currentTime + start;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  // glideTo: 終端周波数まで滑らかに変化（グリッサンド）
  if(opt.glideTo){ osc.frequency.exponentialRampToValueAtTime(Math.max(1,opt.glideTo), t0+dur); }
  // vibrato: ビブラート（周波数を周期的に揺らす）
  let lfo=null, lfoGain=null;
  if(opt.vibrato){
    lfo = audioCtx.createOscillator();
    lfoGain = audioCtx.createGain();
    lfo.frequency.value = opt.vibrato.rate || 6;
    lfoGain.gain.value = opt.vibrato.depth || (freq*0.012);
    lfo.connect(lfoGain).connect(osc.frequency);
    lfo.start(t0); lfo.stop(t0+dur+0.05);
  }
  // 控えめなアタックとリリースで耳ざわりを抑える
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0+(opt.attack||0.012));
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(gain).connect(audioDest());
  osc.start(t0);
  osc.stop(t0+dur+0.05);
}

// 和音（複数音を同時に重ねる）。base配列の各周波数を鳴らす
function playChord(freqs, start, dur, type, vol, opt){
  freqs.forEach(f=>playTone(f, start, dur, type, vol, opt));
}

// 正解：きらびやかな上昇アルペジオ＋和音の重ね＋ビブラート
function playCorrect(){
  if(!soundOn || !audioCtx) return;
  // メジャーコードを分散させて駆け上がる（ド・ミ・ソ・高いド）
  const arp = [523.25, 659.25, 783.99, 1046.50];
  arp.forEach((f,i)=>{
    playTone(f, i*0.05, 0.30, 'triangle', 0.16, {attack:0.008, vibrato:{rate:6, depth:f*0.01}});
  });
  // 最後にトップの和音をふわっと重ねてゴージャスに
  playChord([1046.50, 1318.51], 0.22, 0.34, 'sine', 0.10, {attack:0.01});
  // 上にキラッと倍音を一粒
  playTone(2093.00, 0.26, 0.22, 'triangle', 0.06);
}

// 不正解：下降グリッサンド＋不協和音の「ガクッ」とくるブザー
function playWrong(){
  if(!soundOn || !audioCtx) return;
  // 下降グリッサンドで「ズコー」と落とす
  playTone(330, 0,    0.45, 'sawtooth', 0.12, {glideTo:110, attack:0.01});
  // 半音ぶつけた不協和音を重ねて間抜けさを演出
  playTone(220, 0.02, 0.40, 'square', 0.10);
  playTone(233, 0.02, 0.40, 'square', 0.09); // 半音上でビート(うなり)を出す
  // 最後にダメ押しの低い「ブッ」
  playTone(98,  0.30, 0.30, 'square', 0.13, {glideTo:73});
}

// コンボ：連続数に応じて段階的に派手になる
function playCombo(){
  if(!soundOn || !audioCtx) return;
  // まず通常の正解アルペジオ
  playCorrect();
  const c = state.combo || 2;
  // コンボ数が増えるほど高く・多くキラキラを追加
  const steps = Math.min(c, 7);            // 上限を設けてうるさくなりすぎないように
  const baseTop = 1568;                    // ソ(高)
  for(let i=0;i<steps;i++){
    const f = baseTop * Math.pow(2, i/12); // 半音ずつ上へ駆け上がる
    playTone(f, 0.30 + i*0.045, 0.16, 'triangle', 0.09);
  }
  // 高コンボでは頂点に輝く和音を追加
  if(c>=5){
    playChord([2093, 2637, 3136], 0.30 + steps*0.045, 0.30, 'sine', 0.06, {attack:0.01});
  }
}

// ゲームクリア：長く豪華なファンファーレ（和音進行＋トレモロ＋締めの大和音）
function playFanfare(){
  if(!soundOn || !audioCtx) return;
  // 勇ましい上昇モチーフ（ソ→ド→ミ→ソ→高いド）金管風にsawtooth
  const fanfare = [
    {f:392.00, t:0.00, d:0.18},
    {f:523.25, t:0.16, d:0.18},
    {f:659.25, t:0.32, d:0.18},
    {f:783.99, t:0.48, d:0.20},
    {f:1046.50,t:0.66, d:0.55}
  ];
  fanfare.forEach(n=>{
    playTone(n.f, n.t, n.d, 'sawtooth', 0.13, {attack:0.01});
    playTone(n.f*2, n.t, n.d, 'triangle', 0.05); // 1オクターブ上を薄く重ねて華やかに
  });
  // 伸ばす最後の音にトレモロ（細かく音量を揺らす）を添える
  for(let i=0;i<8;i++){
    playTone(1046.50, 0.70 + i*0.06, 0.06, 'sine', 0.07);
  }
  // 締めの大和音（Cメジャーをワイドに）＋ビブラート
  playChord([523.25, 659.25, 783.99, 1046.50, 1318.51], 1.20, 0.9, 'triangle', 0.09, {attack:0.012, vibrato:{rate:5.5, depth:5}});
  playTone(261.63, 1.20, 0.95, 'sine', 0.10); // 低いドで土台を支える
}

// カウントダウンの「ピッ」（3・2・1の各数字に合わせて1音）。step=0,1,2で少しずつ高くして期待感を出す
function playCountdownTick(step){
  if(!soundOn || !audioCtx) return;
  const freqs = [523.25, 587.33, 659.25]; // ド→レ→ミと上昇
  const f = freqs[Math.min(step, freqs.length-1)];
  playTone(f, 0, 0.12, 'triangle', 0.13, {attack:0.005});
  playTone(f*2, 0, 0.10, 'sine', 0.04); // 1オクターブ上を薄く重ねて明るく
}

// 「START!」の華やかな開始音（上昇アルペジオ＋締めの大和音）
function playStart(){
  if(!soundOn || !audioCtx) return;
  // 上昇アルペジオ（ド→ミ→ソ→高いド→高いミ）でワクワク感を盛り上げる
  const arp = [523.25, 659.25, 783.99, 1046.50, 1318.51];
  arp.forEach((f,i)=>{
    playTone(f, i*0.05, 0.18, 'triangle', 0.13, {attack:0.006});
    playTone(f*2, i*0.05, 0.14, 'sine', 0.04);
  });
  // 締めの明るい大和音（Cメジャー）でパッと開幕
  playChord([523.25, 659.25, 783.99, 1046.50], 0.26, 0.55, 'triangle', 0.10, {attack:0.01, vibrato:{rate:6, depth:5}});
  playTone(261.63, 0.26, 0.58, 'sine', 0.09); // 低いドで土台を支える
}

// ===== ユーティリティ =====
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// 第1問は○×問題になるように出題順を組む
function buildOrder(){
  const oxIdx = QUESTIONS.map((q,i)=>q.type==='ox'?i:-1).filter(i=>i>=0);
  const allIdx = QUESTIONS.map((q,i)=>i);
  const first = oxIdx[Math.floor(Math.random()*oxIdx.length)];
  const rest = shuffle(allIdx.filter(i=>i!==first)).slice(0,QUIZ_LEN-1);
  return [first,...rest];
}

// コンボのかけ声
function comboMessage(combo){
  if(combo>=7)return '🔥 神がかり！とまらない！';
  if(combo>=5)return '⚡ 5連続正解！絶好調！！';
  if(combo>=3)return '✨ 3連続正解！いい調子！';
  if(combo>=2)return '👍 2連続正解！';
  return '';
}

// ランク評価（ウルトラクイズの地名で演出）
function getRank(correct,total){
  const r = correct/total;
  if(r>=1.0) return {place:'🗽 ニューヨーク 決勝',title:'優勝！クイズ王！',emoji:'👑',desc:'全問正解、文句なしの優勝です！自由の女神があなたを祝福しています。来年も挑戦してね！'};
  if(r>=0.8) return {place:'✈️ ニューヨーク到達',title:'準優勝クラス！',emoji:'🏆',desc:'最終決戦の地ニューヨークまで勝ち進みました。あと一歩で優勝です！'};
  if(r>=0.6) return {place:'🌋 ハワイ通過',title:'勝ち抜け！',emoji:'🌺',desc:'ハワイ・グアムを突破して本選へ。実力は十分、優勝も狙えます！'};
  if(r>=0.4) return {place:'🏝 グアム上陸',title:'第一関門突破！',emoji:'🌴',desc:'グアムに上陸しました。ここからが勝負。次はもっと上を目指そう！'};
  if(r>=0.2) return {place:'🛫 成田 出発',title:'まずは旅立ち',emoji:'🛩',desc:'成田を飛び立ちました。ここから先は実力勝負！復習して再挑戦だ。'};
  return {place:'🗼 後楽園球場 ○×ドロンゲーム',title:'ドボン…泥んこ行き！',emoji:'💦',desc:'惜しくも序盤で敗退。でも大丈夫、ウルトラクイズは何度でも挑戦できる！もう一度トライ！'};
}

// ===== 描画 =====
function render(){
  const app=document.getElementById('app');
  switch(state.screen){
    case 'top': app.innerHTML=renderTop(); break;
    case 'countdown': app.innerHTML=renderCountdown(); break;
    case 'quiz': app.innerHTML=renderQuiz(); break;
    case 'feedback': app.innerHTML=renderFeedback(); break;
    case 'final': app.innerHTML=renderFinal(); break;
    case 'records': app.innerHTML=renderRecords(); break;
  }
  bindEvents();
}

function renderTop(){
  const s=getStats();
  let html=`<h1>アメリカ横断<br>ウルトラクイズ風</h1><p class="subtitle"><span class="star">★</span> 一問一答クイズ <span class="star">★</span></p>`;
  html+=`<div class="nav-bar"><button class="nav-btn active" data-nav="top">クイズ</button><button class="nav-btn" data-nav="records">きろく</button></div>`;
  html+=`<div class="hi-box"><div class="lbl">ハイスコア</div><div class="num">${s.hiScore} / ${QUIZ_LEN}</div></div>`;
  html+=`<p class="intro-note">4つのジャンルからミックスして全${QUIZ_LEN}問を出題！<br>○×問題と4択問題が次々に登場します。<br>連続正解でコンボを決めて、目指せニューヨーク決勝！</p>`;
  html+=`<div class="genre-list">`;
  Object.values(GENRES).forEach(g=>{
    html+=`<span class="genre-chip" style="background:${g.color}">${escHtml(g.name)}</span>`;
  });
  html+=`</div>`;
  html+=`<button class="btn btn-primary" data-action="start">スタート！</button>`;
  html+=`<button class="btn btn-outline" data-action="togglesound" style="margin-top:10px">${soundOn?'🔊 効果音：オン':'🔈 効果音：オフ'}</button>`;
  return html;
}

function renderCountdown(){
  const n=state.countdown;
  const txt = n>0 ? n : 'START!';
  return `<div style="padding:80px 0"><div class="countdown">${txt}</div><p class="subtitle" style="margin-top:30px">第1問は名物の○×問題！</p></div>`;
}

function renderQuiz(){
  const q=QUESTIONS[state.order[state.pos]];
  const g=GENRES[q.g];
  let html=``;
  // 進捗バー
  const pct = (state.pos/QUIZ_LEN)*100;
  html+=`<div class="progress-top"><div class="progress-top-fill" style="width:${pct}%"></div></div>`;
  html+=`<div class="qmeta"><span class="qnum">第 ${state.pos+1} 問 / ${QUIZ_LEN}</span><span class="genre-badge" style="background:${g.color}">${escHtml(g.name)}</span></div>`;
  // コンボ表示
  const cm=comboMessage(state.combo);
  if(cm){html+=`<div class="combo-banner">${escHtml(cm)} <span style="font-size:14px">(${state.combo}連続)</span></div>`;}
  html+=`<div class="card">`;
  html+=`<div class="qtype-tag">${q.type==='ox'?'― ○×問題 ―':'― 4択問題 ―'}</div>`;
  html+=`<div class="question-text">${escHtml(q.q)}</div>`;
  if(q.type==='ox'){
    html+=`<div class="maru-batsu">`;
    html+=`<button class="mb-btn mb-maru" data-ox="1">○<span class="mb-label">正しい</span></button>`;
    html+=`<button class="mb-btn mb-batsu" data-ox="0">×<span class="mb-label">まちがい</span></button>`;
    html+=`</div>`;
  }else{
    html+=`<div class="choices">`;
    q.ch.forEach((c,i)=>{
      html+=`<button class="choice-btn" data-choice="${i}"><span class="choice-num">${i+1}</span><span>${escHtml(c)}</span></button>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  html+=`<div style="text-align:center;font-size:12px;color:#7a85b8">現在 ${state.correctCount} 問正解</div>`;
  return html;
}

function renderFeedback(){
  const q=QUESTIONS[state.order[state.pos]];
  const g=GENRES[q.g];
  const ok=state.lastCorrect;
  // 正解の表示テキスト
  let correctText;
  if(q.type==='ox'){
    correctText = q.a ? '○（正しい）' : '×（まちがい）';
  }else{
    correctText = (q.a+1)+'. '+q.ch[q.a];
  }
  let html=``;
  const pct = ((state.pos+1)/QUIZ_LEN)*100;
  html+=`<div class="progress-top"><div class="progress-top-fill" style="width:${pct}%"></div></div>`;
  html+=`<div class="qmeta"><span class="qnum">第 ${state.pos+1} 問 / ${QUIZ_LEN}</span><span class="genre-badge" style="background:${g.color}">${escHtml(g.name)}</span></div>`;
  // 答え合わせ表示（問題を再掲して、選んだ答えを色付け）
  html+=`<div class="card">`;
  html+=`<div class="question-text" style="font-size:17px;margin:6px 0 16px">${escHtml(q.q)}</div>`;
  if(q.type==='ox'){
    html+=`<div class="maru-batsu">`;
    const maruCls = q.a ? 'picked-correct' : (state.lastPicked===1?'picked-wrong':'');
    const batsuCls = !q.a ? 'picked-correct' : (state.lastPicked===0?'picked-wrong':'');
    html+=`<button class="mb-btn mb-maru ${maruCls}" disabled>○<span class="mb-label">正しい</span></button>`;
    html+=`<button class="mb-btn mb-batsu ${batsuCls}" disabled>×<span class="mb-label">まちがい</span></button>`;
    html+=`</div>`;
  }else{
    html+=`<div class="choices">`;
    q.ch.forEach((c,i)=>{
      let cls='choice-btn';
      if(i===q.a)cls+=' correct';
      else if(i===state.lastPicked)cls+=' wrong';
      html+=`<button class="${cls}" disabled><span class="choice-num">${i+1}</span><span>${escHtml(c)}</span></button>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  // 正誤演出
  html+=`<div class="${ok?'result-correct':'result-wrong'}">`;
  html+=`<div class="result-icon">${ok?'⭕️':'❌'}</div>`;
  html+=`<div class="result-label ${ok?'ok':'ng'}">${ok?'ピンポン！正解！':'ブー！不正解'}</div>`;
  if(ok && state.combo>=2){
    html+=`<div style="font-size:15px;color:#ffd700;font-weight:700;margin-bottom:8px">${escHtml(comboMessage(state.combo))}（${state.combo}連続）</div>`;
  }
  html+=`<div class="result-answer">正解は <strong>${escHtml(correctText)}</strong></div>`;
  html+=`<div class="result-explanation">${escHtml(q.ex)}</div>`;
  html+=`</div>`;
  html+=`<div style="height:12px"></div>`;
  const last = state.pos>=QUIZ_LEN-1;
  html+=`<button class="btn btn-gold" data-action="next">${last?'結果を見る →':'次の問題へ →'}</button>`;
  return html;
}

function renderFinal(){
  const s=getStats();
  const correct=state.correctCount;
  const rate=Math.round(correct/QUIZ_LEN*100);
  const rank=getRank(correct,QUIZ_LEN);
  const isNewHi = correct>=s.hiScore;
  let html=`<h1>結果発表！</h1><p class="subtitle"><span class="star">★</span> FINAL RESULT <span class="star">★</span></p>`;
  html+=`<div class="final-rank">`;
  html+=`<div class="rank-place">${escHtml(rank.place)}</div>`;
  html+=`<div class="rank-emoji">${rank.emoji}</div>`;
  html+=`<div class="rank-title">${escHtml(rank.title)}</div>`;
  html+=`<div class="rank-desc">${escHtml(rank.desc)}</div>`;
  html+=`</div>`;
  html+=`<div class="card" style="text-align:center">`;
  html+=`<div class="big-score">${correct}<small> / ${QUIZ_LEN}</small></div>`;
  html+=`<div class="scoreline"><div><div class="num">${rate}%</div><div class="lbl">正解率</div></div><div><div class="num">${state.maxCombo}</div><div class="lbl">最大コンボ</div></div></div>`;
  if(isNewHi && correct>0){
    html+=`<div style="color:#ffd700;font-weight:800;font-size:18px;animation:pop .5s ease">🎉 ハイスコア更新！ 🎉</div>`;
  }
  html+=`</div>`;
  html+=`<button class="btn btn-primary" data-action="start" style="animation:none">もう一度挑戦！</button>`;
  html+=`<button class="btn btn-outline" data-action="home">トップに戻る</button>`;
  return html;
}

function renderRecords(){
  const s=getStats();
  const avg = s.totalQ>0 ? Math.round(s.totalCorrect/s.totalQ*100) : 0;
  let html=`<h1>あなたのきろく</h1><p class="subtitle"><span class="star">★</span> RECORDS <span class="star">★</span></p>`;
  html+=`<div class="nav-bar"><button class="nav-btn" data-nav="top">クイズ</button><button class="nav-btn active" data-nav="records">きろく</button></div>`;
  html+=`<div class="card">`;
  html+=`<div class="stats-row"><div><div class="stat-num">${s.hiScore}</div><div class="stat-label">ハイスコア(/${QUIZ_LEN})</div></div><div><div class="stat-num">${s.plays}</div><div class="stat-label">プレイ回数</div></div><div><div class="stat-num">${avg}%</div><div class="stat-label">累計正解率</div></div></div>`;
  html+=`<div style="text-align:center;font-size:13px;color:#aab4e0;margin-top:8px">これまで ${s.totalQ} 問に挑戦し、${s.totalCorrect} 問正解しています。</div>`;
  html+=`</div>`;
  html+=`<button class="btn btn-danger" data-action="reset" style="margin-top:8px">きろくをリセット</button>`;
  return html;
}

// ===== イベント =====
function bindEvents(){
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handleAction));
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',function(){
      const nav=this.getAttribute('data-nav');
      state.screen = (nav==='records')?'records':'top';
      render();
    });
  });
  document.querySelectorAll('[data-ox]').forEach(el=>{
    el.addEventListener('click',function(){
      if(state.answered)return;
      const picked=parseInt(this.getAttribute('data-ox')); // 1=○, 0=×
      const q=QUESTIONS[state.order[state.pos]];
      const pickedTrue = picked===1;      // ユーザーが○を選んだか
      doAnswer(pickedTrue===q.a, picked); // 実際の正解 q.a(真偽値) と照合
    });
  });
  document.querySelectorAll('[data-choice]').forEach(el=>{
    el.addEventListener('click',function(){
      if(state.answered)return;
      const picked=parseInt(this.getAttribute('data-choice'));
      const q=QUESTIONS[state.order[state.pos]];
      doAnswer(picked===q.a, picked);
    });
  });
}

function handleAction(e){
  const action=e.currentTarget.getAttribute('data-action');
  switch(action){
    case 'start': startGame(); break;
    case 'home': state.screen='top'; render(); break;
    case 'togglesound':
      soundOn = !soundOn;
      try{ localStorage.setItem('ultraquiz_sound', soundOn?'1':'0'); }catch(e){}
      if(soundOn){ ensureAudio(); playCorrect(); } // オンにした時に確認音
      render();
      break;
    case 'next': nextQuestion(); break;
    case 'reset':
      if(confirm('きろく（ハイスコア・プレイ回数・正解率）をすべてリセットしますか？この操作は取り消せません。')){
        localStorage.removeItem('ultraquiz_stats');
        state.screen='records';
        render();
      }
      break;
  }
}

function startGame(){
  ensureAudio(); // iOS Safari対策：最初のユーザー操作でAudioContextを起こす
  state.order = buildOrder();
  state.pos = 0;
  state.correctCount = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.answered = false;
  // カウントダウン演出
  state.screen='countdown';
  state.countdown=3;
  render();
  playCountdownTick(0); // 「3」に合わせて1音目
  const tick=()=>{
    state.countdown--;
    if(state.countdown>0){ render(); playCountdownTick(3-state.countdown); setTimeout(tick,700); } // 2,1 に合わせて鳴らす
    else if(state.countdown===0){ render(); playStart(); setTimeout(tick,700); } // START! で華やかな開始音
    else { state.screen='quiz'; render(); }
  };
  setTimeout(tick,700);
}

function doAnswer(isCorrect, picked){
  state.answered=true;
  state.lastCorrect=isCorrect;
  state.lastPicked=picked;
  if(isCorrect){
    state.correctCount++;
    state.combo++;
    if(state.combo>state.maxCombo)state.maxCombo=state.combo;
    if(state.combo>=2) playCombo(); else playCorrect();
  }else{
    state.combo=0;
    playWrong();
  }
  state.screen='feedback';
  render();
}

function nextQuestion(){
  if(state.pos>=QUIZ_LEN-1){
    finishGame();
    return;
  }
  state.pos++;
  state.answered=false;
  state.screen='quiz';
  render();
}

function finishGame(){
  // 統計保存
  const s=getStats();
  s.plays++;
  s.totalQ += QUIZ_LEN;
  s.totalCorrect += state.correctCount;
  if(state.correctCount > s.hiScore) s.hiScore = state.correctCount;
  saveStats(s);
  state.screen='final';
  render();
  playFanfare();
}

// 初期描画
render();
</script>
